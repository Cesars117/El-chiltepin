name: Deploy El Chiltepin

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client and Temp DB
        run: |
          npx prisma generate
          npx prisma db push --accept-data-loss
        env:
          DATABASE_URL: "file:./prisma/dev.db"

      - name: Build project
        run: npm run build
        env:
          DATABASE_URL: "file:./prisma/dev.db"

      - name: Prepare Standalone Bundle
        run: |
          cp -r public .next/standalone/public
          cp -r .next/static .next/standalone/.next/static
          cp -r prisma .next/standalone/prisma
          # Copiamos el cliente de Prisma generado para evitar generarlo en el servidor
          mkdir -p .next/standalone/node_modules/.prisma
          cp -r node_modules/.prisma/* .next/standalone/node_modules/.prisma/
          # Copiamos también el archivo server.js personalizado
          cp server.js .next/standalone/custom-server.js

      - name: Cleanup Target
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.PORT }}
          timeout: 60s
          script: |
            # Intentar detener la aplicación de forma segura
            export PATH=$PATH:/usr/local/bin:/usr/bin:/bin:$HOME/bin:$HOME/.local/bin
            PM2_BIN=$(which pm2 2>/dev/null || find $HOME -name pm2 -type f -executable -print -quit 2>/dev/null || echo "pm2")
            
            if command -v $PM2_BIN >/dev/null 2>&1; then
              $PM2_BIN stop el-chiltepin || true
            fi
            
            mkdir -p ${{ secrets.TARGET }}
            # Limpiar el directorio preservando el .env
            find ${{ secrets.TARGET }} -mindepth 1 ! -name '.env' -delete || rm -rf ${{ secrets.TARGET }}/*

      - name: Copy files via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.PORT }}
          timeout: 60s
          source: ".next/standalone/*"
          target: ${{ secrets.TARGET }}
          strip_components: 2
          overwrite: true

      - name: Run SSH commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.PORT }}
          timeout: 60s
          script: |
            cd ${{ secrets.TARGET }}
            
            # Intentar localizar Node y NPM dinámicamente
            echo "Buscando rutas de ejecución..."
            export PATH=$PATH:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin:$HOME/bin:$HOME/.local/bin
            
            NODE_PATH=$(which node 2>/dev/null || find /opt/alt/alt-nodejs* -name node -type f -executable -print -quit 2>/dev/null)
            NPM_PATH=$(which npm 2>/dev/null || find /opt/alt/alt-nodejs* -name npm -type f -executable -print -quit 2>/dev/null)
            
            if [ -n "$NODE_PATH" ]; then
              export PATH=$(dirname $NODE_PATH):$PATH
              echo "Node encontrado en: $NODE_PATH"
            fi
            
            # Ajustar permisos de forma silenciosa y recursiva
            echo "Ajustando permisos de forma segura..."
            chmod -R 755 . 2>/dev/null || true
            
            # Configurar Prisma
            echo "Verificando cliente de Prisma..."
            if [ ! -d "./node_modules/.prisma" ]; then
              echo "Cliente no encontrado, intentando generar..."
              npx prisma generate || $NODE_PATH node_modules/.bin/prisma generate || echo "Fallo al generar Prisma"
            fi
            
            # Reiniciar la aplicación con PM2 o informar si no existe
            echo "Gestionando proceso con PM2..."
            PM2_BIN=$(which pm2 2>/dev/null || find $HOME -name pm2 -type f -executable -print -quit 2>/dev/null || find /usr/local/bin -name pm2 -type f -executable -print -quit 2>/dev/null || echo "pm2")
            
            if command -v $PM2_BIN >/dev/null 2>&1; then
              $PM2_BIN restart el-chiltepin || $PM2_BIN start server.js --name el-chiltepin
            else
              echo "ADVERTENCIA: PM2 no encontrado. Si estás usando el selector de Node.js de Hostinger, reinicia la app desde el panel."
              echo "Intentando inicio manual básico para verificar..."
              # No podemos dejarlo corriendo en background fácilmente sin PM2 o nohup
              # pero al menos intentamos ver si arranca
              # nohup $NODE_PATH server.js > output.log 2>&1 &
            fi
