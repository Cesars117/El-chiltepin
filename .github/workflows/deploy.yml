name: Deploy El Chiltepin

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client and Temp DB
        run: |
          npx prisma generate
          npx prisma db push --accept-data-loss
        env:
          DATABASE_URL: "file:./prisma/dev.db"

      - name: Build project
        run: npm run build
        env:
          DATABASE_URL: "file:./prisma/dev.db"

      - name: Prepare Standalone Bundle
        run: |
          cp -r public .next/standalone/public
          cp -r .next/static .next/standalone/.next/static
          cp -r prisma .next/standalone/prisma
          # Copiamos el cliente de Prisma generado para evitar generarlo en el servidor
          mkdir -p .next/standalone/node_modules/.prisma
          cp -r node_modules/.prisma/* .next/standalone/node_modules/.prisma/
          # Copiamos también el archivo server.js personalizado
          cp server.js .next/standalone/custom-server.js

      - name: Cleanup Target
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.PORT }}
          timeout: 60s
          script: |
            # Intentar detener la aplicación para liberar archivos
            export PATH=$PATH:$HOME/bin:$HOME/.local/bin:$HOME/.npm-global/bin
            PM2_BIN=$(which pm2 2>/dev/null || find $HOME -name pm2 -type f -executable -print -quit || echo "pm2")
            $PM2_BIN stop el-chiltepin || true
            
            mkdir -p ${{ secrets.TARGET }}
            # Limpiar el directorio preservando el .env
            find ${{ secrets.TARGET }} -mindepth 1 ! -name '.env' -delete || rm -rf ${{ secrets.TARGET }}/*

      - name: Copy files via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.PORT }}
          timeout: 60s
          source: ".next/standalone/*"
          target: ${{ secrets.TARGET }}
          strip_components: 2
          overwrite: true

      - name: Run SSH commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.PORT }}
          timeout: 60s
          script: |
            cd ${{ secrets.TARGET }}
            
            # Cargar perfiles y rutas comunes en Hostinger
            export PATH=$PATH:$HOME/bin:$HOME/.local/bin:$HOME/.npm-global/bin:/usr/local/bin:/usr/bin
            [ -f ~/.bashrc ] && . ~/.bashrc
            [ -f ~/.bash_profile ] && . ~/.bash_profile
            [ -f ~/.profile ] && . ~/.profile
            
            # Ajustar permisos (ignorar errores en archivos que no pertenecen al usuario si los hay)
            echo "Ajustando permisos..."
            find . -type d -exec chmod 755 {} + 2>/dev/null || true
            find . -type f -exec chmod 644 {} + 2>/dev/null || true
            
            # Configurar Prisma (solo si es necesario, ya que lo subimos en el bundle)
            echo "Verificando cliente de Prisma..."
            if [ ! -d "./node_modules/.prisma" ]; then
              echo "Cliente no encontrado, intentando generar..."
              if command -v npx >/dev/null 2>&1; then
                npx prisma generate
              elif [ -f "./node_modules/.bin/prisma" ]; then
                node ./node_modules/.bin/prisma generate
              else
                npm install prisma --no-save && node ./node_modules/.bin/prisma generate
              fi
            fi
            
            # Reiniciar la aplicación con PM2
            echo "Reiniciando aplicación con PM2..."
            PM2_BIN=$(which pm2 2>/dev/null || find $HOME -name pm2 -type f -executable -print -quit || echo "pm2")
            $PM2_BIN restart el-chiltepin || $PM2_BIN start server.js --name el-chiltepin
