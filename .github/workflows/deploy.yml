name: Deploy El Chiltepin

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client and Temp DB
        run: |
          npx prisma generate
          npx prisma db push --accept-data-loss
        env:
          DATABASE_URL: "file:./prisma/dev.db"

      - name: Build project
        run: npm run build
        env:
          DATABASE_URL: "file:./prisma/dev.db"

      - name: Prepare Standalone Bundle
        run: |
          cp -r public .next/standalone/public
          cp -r .next/static .next/standalone/.next/static
          cp -r prisma .next/standalone/prisma
          # Copiamos el cliente de Prisma generado para evitar generarlo en el servidor
          mkdir -p .next/standalone/node_modules/.prisma
          cp -r node_modules/.prisma/* .next/standalone/node_modules/.prisma/
          # Copiamos también el archivo server.js personalizado
          cp server.js .next/standalone/custom-server.js

      - name: Cleanup Target
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.PORT }}
          timeout: 60s
          script: |
            # Intentar detener la aplicación de forma segura
            export PATH=$PATH:/usr/local/bin:/usr/bin:/bin:$HOME/bin:$HOME/.local/bin
            PM2_BIN=$(which pm2 2>/dev/null || find $HOME -name pm2 -type f -executable -print -quit 2>/dev/null || echo "pm2")
            
            if command -v $PM2_BIN >/dev/null 2>&1; then
              $PM2_BIN stop el-chiltepin || true
            fi
            
            mkdir -p ${{ secrets.TARGET }}
            # Limpiar el directorio preservando el .env
            find ${{ secrets.TARGET }} -mindepth 1 ! -name '.env' -delete || rm -rf ${{ secrets.TARGET }}/*

      - name: Copy files via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.PORT }}
          timeout: 60s
          source: ".next/standalone/*"
          target: ${{ secrets.TARGET }}
          strip_components: 2
          overwrite: true

      - name: Run SSH commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.PORT }}
          timeout: 60s
          script: |
            cd ${{ secrets.TARGET }}
            
            # Usar la ruta de Node detectada en el paso anterior
            NODE_BIN="/opt/alt/alt-nodejs18/root/usr/bin/node"
            export PATH=$(dirname $NODE_BIN):$PATH
            
            echo "--- DIAGNÓSTICO DE PERMISOS ---"
            cd ..
            chmod 755 $(basename ${{ secrets.TARGET }}) 2>/dev/null || true
            cd ${{ secrets.TARGET }}
            chmod -R 755 . 2>/dev/null || true
            ls -la . | head -n 20
            
            # Configurar Prisma
            echo "--- CONFIGURANDO PRISMA ---"
            if [ ! -d "./node_modules/.prisma" ]; then
              $NODE_BIN node_modules/.bin/prisma generate || echo "Advertencia: No se pudo generar Prisma"
            fi
            
            # Prueba de arranque rápida (5 segundos) para ver errores
            echo "--- PRUEBA DE ARRANQUE (5s) ---"
            timeout 5s $NODE_BIN server.js || echo "Prueba de arranque terminada (esto es normal si pasaron los 5s)"
            
            # Reiniciar app usando el server.js generado por Next.js (el de standalone)
            echo "--- REINICIANDO PROCESO ---"
            PM2_BIN=$(which pm2 2>/dev/null)
            if [ -n "$PM2_BIN" ]; then
              # Usamos server.js directamente que es el generado por Next.js
              $PM2_BIN restart el-chiltepin || $PM2_BIN start server.js --name el-chiltepin
            else
              echo "PM2 no encontrado, usando nohup como fallback..."
              # Matar procesos de node previos para evitar conflictos de puerto
              pkill -u $(whoami) node || true
              # Arrancar en background
              nohup $NODE_BIN server.js > app.log 2>&1 &
              sleep 2
              echo "App arrancada con nohup. Despliegue completado."
            fi
