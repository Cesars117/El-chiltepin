name: Deploy El Chiltepin

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client and Temp DB
        run: |
          npx prisma generate
          npx prisma db push --accept-data-loss
        env:
          DATABASE_URL: "file:./prisma/dev.db"

      - name: Build project
        run: npm run build
        env:
          DATABASE_URL: "file:./prisma/dev.db"

      - name: Prepare Standalone Bundle
        run: |
          cp -r public .next/standalone/public
          cp -r .next/static .next/standalone/.next/static
          cp -r prisma .next/standalone/prisma
          # Copiamos también el archivo server.js personalizado por si se prefiere usar como entry point
          cp server.js .next/standalone/custom-server.js

      - name: Cleanup Target
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.PORT }}
          script: |
            mkdir -p ${{ secrets.TARGET }}
            rm -rf ${{ secrets.TARGET }}/*
            rm -rf ${{ secrets.TARGET }}/.next
            # No borramos el .env si existe para persistir config
            # find ${{ secrets.TARGET }} -mindepth 1 ! -name '.env' -delete

      - name: Copy files via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.PORT }}
          source: ".next/standalone/*"
          target: ${{ secrets.TARGET }}
          strip_components: 2
          overwrite: true

      - name: Run SSH commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.PORT }}
          script: |
            cd ${{ secrets.TARGET }}
            
            # Intentar cargar el perfil de usuario para tener Node/NPM/PM2 en el PATH
            export PATH=$PATH:$HOME/bin:$HOME/.local/bin:$HOME/.npm-global/bin
            [ -f ~/.bashrc ] && . ~/.bashrc
            [ -f ~/.bash_profile ] && . ~/.bash_profile
            [ -f ~/.profile ] && . ~/.profile
            
            # Ajustar permisos para evitar el error 403
            echo "Ajustando permisos..."
            find . -type d -exec chmod 755 {} \;
            find . -type f -exec chmod 644 {} \;
            
            # Configurar Prisma
            echo "Generando cliente de Prisma..."
            # Intentamos encontrar npx si no está en el path
            NPX_PATH=$(which npx || echo "npx")
            $NPX_PATH prisma generate
            
            # Reiniciar la aplicación con PM2
            echo "Reiniciando aplicación con PM2..."
            PM2_PATH=$(which pm2 || echo "pm2")
            $PM2_PATH restart el-chiltepin || $PM2_PATH start server.js --name el-chiltepin
